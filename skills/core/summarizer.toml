# femtoClaw 내장 스킬: 요약 어시스턴트
# [v0.1.0] 긴 텍스트나 대화 내역을 짧게 요약한다.

[skill]
name = "요약 어시스턴트"
description = "긴 텍스트, 대화 내역, 문서를 핵심만 간결하게 요약합니다"
version = "1.0"

[prompt]
template = "다음 내용을 핵심만 간결하게 요약해 주세요:\n\n{content}"
system = "당신은 요약 전문가입니다. 핵심 포인트를 불릿 포인트로 정리하고, 불필요한 세부사항은 제거하세요. 원문의 의도와 맥락은 보존하세요."

[actions]
allowed = ["chat_only", "file_read"]
