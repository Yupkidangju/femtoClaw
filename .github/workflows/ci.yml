name: femtoClaw CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ━━━ 1단계: 린트 + 포맷 검사 ━━━
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: 포맷 검사
        run: cargo fmt --all -- --check
      - name: Clippy 린트
        run: cargo clippy --all-targets

  # ━━━ 2단계: 테스트 (Windows + Linux) ━━━
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 테스트 실행
        run: cargo test --verbose

  # ━━━ 3단계: 릴리즈 빌드 (3개 타겟) ━━━
  build:
    name: Build (${{ matrix.target.label }})
    needs: test
    strategy:
      matrix:
        target:
          - label: Windows x64
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            artifact: femtoclaw-windows-x64.exe
            ext: .exe
          - label: Linux x64
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            artifact: femtoclaw-linux-x64
            ext: ""
          - label: Raspberry Pi (ARM64)
            os: ubuntu-latest
            triple: aarch64-unknown-linux-gnu
            artifact: femtoclaw-rpi-aarch64
            ext: ""
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      # ARM 크로스컴파일 toolchain (RPi용)
      - name: ARM 크로스컴파일러 설치
        if: contains(matrix.target.triple, 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - uses: Swatinem/rust-cache@v2

      - name: 릴리즈 빌드
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: 바이너리 복사
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target.triple }}/release/femtoclaw${{ matrix.target.ext }} dist/${{ matrix.target.artifact }}

      - name: 바이너리 크기 출력
        shell: bash
        run: |
          ls -lh dist/${{ matrix.target.artifact }}

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}

  # ━━━ 4단계: GitHub Release (태그 푸시 시) ━━━
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
